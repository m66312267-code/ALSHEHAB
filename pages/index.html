<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALSHHAB — تسجيل الدخول</title>
  <meta name="description" content="منصة ALSHHAB التعليمية — تعلم من الصفر حتى الاحتراف">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="toast"></div>
<div class="offline-badge" id="offlineBadge">⚠️ أنت غير متصل بالإنترنت</div>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-logo">A L S H H A B</div>
  <div class="splash-sub">منصة تعليمية عالمية</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<!-- COOKIE CONSENT -->
<div id="cookie-bar">
  <p>🍪 نستخدم الكوكيز لتحسين تجربتك على منصة ALSHHAB.</p>
  <button class="cookie-accept" onclick="acceptCookies()">موافق</button>
</div>

<!-- SETTINGS PANEL -->
<div class="settings-panel" id="settingsPanel">
  <h4>🎨 لون المنصة</h4>
  <div class="theme-dots">
    <div class="tdot active" style="background:#00d4aa;" onclick="setColor('green')"></div>
    <div class="tdot" style="background:#3b82f6;" onclick="setColor('blue')"></div>
    <div class="tdot" style="background:#a855f7;" onclick="setColor('purple')"></div>
    <div class="tdot" style="background:#f97316;" onclick="setColor('orange')"></div>
  </div>
  <h4>🌙 المظهر</h4>
  <div style="display:flex;gap:8px;">
    <button class="ftab active" onclick="setMode('dark')" style="flex:1;padding:7px;">داكن</button>
    <button class="ftab" onclick="setMode('light')" style="flex:1;padding:7px;">فاتح</button>
  </div>
</div>
<button class="float-settings" onclick="toggleSettings()">⚙️</button>

<!-- AUTH SCREEN -->
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;">
  <div class="auth-box">
    <div class="auth-logo">A L S H H A B</div>
    <div class="auth-sub">منصة تعليمية 🎓</div>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</div>
      <div class="auth-tab" onclick="switchAuth('register')">حساب جديد</div>
    </div>

    <!-- رسائل -->
    <div id="authError" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;"></div>
    <div id="authSuccess" style="display:none;background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);color:var(--accent);padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;"></div>

    <!-- Login -->
    <div class="auth-form active" id="form-login">
      <label class="inp-label">البريد الإلكتروني</label>
      <input class="inp" type="email" placeholder="example@email.com" id="login-email">
      <label class="inp-label">كلمة السر</label>
      <input class="inp" type="password" placeholder="••••••••" id="login-pass">
      <button class="btn-full" id="loginBtn" onclick="doLogin()">دخول ←</button>
      <p style="text-align:center;margin-top:14px;font-size:12px;color:var(--text-dim);cursor:pointer;" onclick="switchAuth('reset')">نسيت كلمة السر؟</p>
    </div>

    <!-- Register -->
    <div class="auth-form" id="form-register">
      <label class="inp-label">الاسم الكامل</label>
      <input class="inp" type="text" placeholder="اكتب اسمك" id="reg-name">
      <label class="inp-label">البريد الإلكتروني</label>
      <input class="inp" type="email" placeholder="example@email.com" id="reg-email">
      <label class="inp-label">كلمة السر (6 أحرف على الأقل)</label>
      <input class="inp" type="password" placeholder="••••••••" id="reg-pass">
      <button class="btn-full" id="registerBtn" onclick="doRegister()">إنشاء الحساب ←</button>
    </div>

    <!-- Reset Password -->
    <div class="auth-form" id="form-reset">
      <p style="font-size:13px;color:var(--text-dim);margin-bottom:15px;">أدخل إيميلك وهنبعتلك رابط إعادة تعيين كلمة السر</p>
      <label class="inp-label">البريد الإلكتروني</label>
      <input class="inp" type="email" placeholder="example@email.com" id="reset-email">
      <button class="btn-full" id="resetBtn" onclick="doReset()">إرسال الرابط ←</button>
      <p style="text-align:center;margin-top:12px;font-size:12px;color:var(--text-dim);cursor:pointer;" onclick="switchAuth('login')">← رجوع</p>
    </div>
  </div>
</div>

<script src="../js/shared.js"></script>
<script src="../js/supabase.js"></script>
<script>
  // لو مسجل دخول خلاص، روّحه للداشبورد
  if (sb.isLoggedIn()) window.location.href = 'dashboard.html';

  // Splash
  setTimeout(() => {
    const s = document.getElementById('splash');
    s.style.opacity = '0';
    setTimeout(() => s.style.display = 'none', 600);
  }, 2200);

  function switchAuth(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
    });
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.getElementById('form-' + tab).classList.add('active');
    hideMessages();
  }

  function showError(msg) {
    const el = document.getElementById('authError');
    el.textContent = '⚠️ ' + msg;
    el.style.display = 'block';
    document.getElementById('authSuccess').style.display = 'none';
  }
  function showSuccess(msg) {
    const el = document.getElementById('authSuccess');
    el.textContent = '✅ ' + msg;
    el.style.display = 'block';
    document.getElementById('authError').style.display = 'none';
  }
  function hideMessages() {
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authSuccess').style.display = 'none';
  }
  function setLoading(btnId, loading, defaultText) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? '⏳ جاري...' : defaultText;
  }

  // ===== LOGIN =====
  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    if (!email || !pass) { showError('أدخل الإيميل وكلمة السر'); return; }
    hideMessages();
    setLoading('loginBtn', true, 'دخول ←');
    try {
      await sb.signIn(email, pass);
      showSuccess('أهلاً بك! جاري التحويل...');
      setTimeout(() => window.location.href = 'dashboard.html', 1500);
    } catch(e) {
      showError(e.message || 'الإيميل أو كلمة السر غلط');
      setLoading('loginBtn', false, 'دخول ←');
    }
  }

  // ===== REGISTER =====
  async function doRegister() {
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass  = document.getElementById('reg-pass').value;
    if (!name || !email || !pass) { showError('أكمل كل الحقول'); return; }
    if (pass.length < 6) { showError('كلمة السر لازم تكون 6 أحرف على الأقل'); return; }
    hideMessages();
    setLoading('registerBtn', true, 'إنشاء الحساب ←');
    try {
      const res = await sb.signUp(email, pass, name);
      if (res.user && !res.access_token) {
        showSuccess('تم إنشاء الحساب! افتح إيميلك وأكد الحساب ثم ادخل 📧');
        setLoading('registerBtn', false, 'إنشاء الحساب ←');
      } else {
        showSuccess('تم إنشاء الحساب! 🎉 جاري التحويل...');
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
      }
    } catch(e) {
      showError(e.message || 'حدث خطأ، حاول تاني');
      setLoading('registerBtn', false, 'إنشاء الحساب ←');
    }
  }

  // ===== RESET PASSWORD =====
  async function doReset() {
    const email = document.getElementById('reset-email').value.trim();
    if (!email) { showError('أدخل الإيميل أولاً'); return; }
    setLoading('resetBtn', true, 'إرسال الرابط ←');
    try {
      await fetch(`${sb.url}/auth/v1/recover`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': sb.key },
        body: JSON.stringify({ email }),
      });
      showSuccess('تم إرسال رابط إعادة التعيين على إيميلك 📧');
    } catch {
      showError('حدث خطأ، تأكد من الإيميل');
    }
    setLoading('resetBtn', false, 'إرسال الرابط ←');
  }

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('form-login').classList.contains('active')) doLogin();
    else if (document.getElementById('form-register').classList.contains('active')) doRegister();
    else if (document.getElementById('form-reset').classList.contains('active')) doReset();
  });
</script>
</body>
</html>
