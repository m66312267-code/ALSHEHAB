<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALSHHAB — تسجيل الدخول</title>
  <meta name="description" content="منصة ALSHHAB التعليمية — تعلم من الصفر حتى الاحتراف">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<!-- CUSTOM CURSOR -->



<!-- TOAST -->
<div id="toast"></div>

<!-- OFFLINE BADGE -->
<div class="offline-badge" id="offlineBadge">⚠️ أنت غير متصل بالإنترنت</div>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-logo">A L S H H A B</div>
  <div class="splash-sub">منصة تعليمية عالمية</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<!-- COOKIE CONSENT -->
<div id="cookie-bar">
  <p>🍪 نستخدم الكوكيز لتحسين تجربتك على منصة ALSHHAB. باستمرارك فأنت توافق على <strong>سياسة الخصوصية</strong>.</p>
  <button class="cookie-accept" onclick="acceptCookies()">موافق</button>
</div>

<!-- SETTINGS PANEL -->
<div class="settings-panel" id="settingsPanel">
  <h4>🎨 لون المنصة</h4>
  <div class="theme-dots">
    <div class="tdot active" style="background:#00d4aa;" onclick="setColor('green')" title="أخضر"></div>
    <div class="tdot" style="background:#3b82f6;" onclick="setColor('blue')" title="أزرق"></div>
    <div class="tdot" style="background:#a855f7;" onclick="setColor('purple')" title="بنفسجي"></div>
    <div class="tdot" style="background:#f97316;" onclick="setColor('orange')" title="برتقالي"></div>
  </div>
  <h4>🌙 المظهر</h4>
  <div style="display:flex;gap:8px;">
    <button class="ftab active" onclick="setMode('dark')" style="flex:1;padding:7px;">داكن</button>
    <button class="ftab" onclick="setMode('light')" style="flex:1;padding:7px;">فاتح</button>
  </div>
</div>
<button class="float-settings" onclick="toggleSettings()" title="الإعدادات">⚙️</button>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="show" style="position:relative;inset:unset;min-height:100vh;display:flex;align-items:center;justify-content:center;">
  <div class="auth-box">
    <div class="auth-logo">A L S H H A B</div>
    <div class="auth-sub">منصة تعليمية 🎓</div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</div>
      <div class="auth-tab" onclick="switchAuth('register')">حساب جديد</div>
    </div>

    <!-- Login -->
    <div class="auth-form active" id="form-login">
      <label class="inp-label">البريد الإلكتروني</label>
      <input class="inp" type="email" placeholder="example@email.com" id="login-email">
      <label class="inp-label">كلمة السر</label>
      <input class="inp" type="password" placeholder="••••••••" id="login-pass">
      <button class="btn-full" onclick="doLogin()">دخول ←</button>
      <button class="google-btn" onclick="doLogin()">🌐 الدخول بحساب Google</button>
      <p style="text-align:center;margin-top:14px;font-size:12px;color:var(--text-dim);cursor:pointer;" onclick="showOTP()">نسيت كلمة السر؟</p>
    </div>

    <!-- Register -->
    <div class="auth-form" id="form-register">
      <label class="inp-label">الاسم الكامل</label>
      <input class="inp" type="text" placeholder="اكتب اسمك">
      <label class="inp-label">البريد الإلكتروني</label>
      <input class="inp" type="email" placeholder="example@email.com">
      <label class="inp-label">كلمة السر</label>
      <input class="inp" type="password" placeholder="••••••••">
      <button class="btn-full" onclick="showOTP()">إنشاء الحساب ←</button>
      <button class="google-btn" onclick="doLogin()">🌐 التسجيل بحساب Google</button>
    </div>

    <!-- OTP -->
    <div class="auth-form" id="form-otp">
      <p style="text-align:center;color:var(--text-dim);font-size:13px;margin-bottom:5px;">أدخل الكود المرسل على إيميلك</p>
      <div class="otp-grid">
        <input class="otp-input" maxlength="1" oninput="otpNext(this,0)">
        <input class="otp-input" maxlength="1" oninput="otpNext(this,1)">
        <input class="otp-input" maxlength="1" oninput="otpNext(this,2)">
        <input class="otp-input" maxlength="1" oninput="otpNext(this,3)">
        <input class="otp-input" maxlength="1" oninput="otpNext(this,4)">
        <input class="otp-input" maxlength="1" oninput="otpNext(this,5)">
      </div>
      <button class="btn-full" onclick="doLogin()">تأكيد الكود ✓</button>
      <p style="text-align:center;margin-top:12px;font-size:12px;color:var(--text-dim);cursor:pointer;" onclick="switchAuth('login')">← رجوع</p>
    </div>
  </div>
</div>

<script src="../js/shared.js"></script>
<script>
  // ===== SPLASH =====
  setTimeout(()=>{
    const s = document.getElementById('splash');
    s.style.opacity='0';
    setTimeout(()=>{ s.style.display='none'; },600);
  },2200);

  // ===== AUTH FUNCTIONS =====
  function switchAuth(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i)=>{
      t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
    });
    document.getElementById('form-login').classList.toggle('active', tab==='login');
    document.getElementById('form-register').classList.toggle('active', tab==='register');
    document.getElementById('form-otp').classList.remove('active');
  }

  function showOTP() {
    document.querySelectorAll('.auth-form').forEach(f=>f.classList.remove('active'));
    document.getElementById('form-otp').classList.add('active');
  }

  function otpNext(inp,idx){
    if(inp.value.length===1){
      const inputs=document.querySelectorAll('.otp-input');
      if(inputs[idx+1]) inputs[idx+1].focus();
    }
  }

  function doLogin(){
    const email = document.getElementById('login-email')?.value?.trim();
    const name = email ? email.split('@')[0] : 'طالب';
    // Save user to localStorage
    const existing = JSON.parse(localStorage.getItem('alshhab_user') || '{}');
    if (!existing.name) {
      localStorage.setItem('alshhab_user', JSON.stringify({ name, email: email || '' }));
    }
    showToast('جاري الدخول...');
    setTimeout(()=>{ window.location.href = 'dashboard.html'; }, 800);
  }
</script>
</body>
</html>
